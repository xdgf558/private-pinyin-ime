name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run desktop AI clippy
        run: cargo clippy -p private_pinyin_ime_ffi --all-targets --features desktop-ai -- -D warnings

      - name: Run iOS AI clippy
        run: cargo clippy -p private_pinyin_ime_ffi --all-targets --features ios-ai -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run desktop AI FFI tests
        run: cargo test -p private_pinyin_ime_ffi --features desktop-ai

      - name: Run iOS AI FFI tests
        run: cargo test -p private_pinyin_ime_ffi --features ios-ai

      - name: Build and run C ABI demo
        run: bash scripts/run_c_demo.sh

      - name: Check Windows TSF source scaffold
        run: bash scripts/check_windows_tsf_sources.sh

      - name: Check macOS IMK source scaffold
        run: bash scripts/check_macos_imk_sources.sh

      - name: Check installer and settings scaffold
        run: bash scripts/check_installers_settings_sources.sh

      - name: Check iOS keyboard source scaffold
        run: bash scripts/check_ios_keyboard_sources.sh

      - name: Check platform validation scaffold
        run: bash scripts/check_platform_validation_sources.sh

      - name: Check Stage 09 core hardening scaffold
        run: bash scripts/check_stage09_core_sources.sh

      - name: Check Stage 10 platform host polish scaffold
        run: bash scripts/check_stage10_platform_host_sources.sh

      - name: Check Stage 11 settings privacy scaffold
        run: bash scripts/check_stage11_settings_privacy_sources.sh

      - name: Check Stage 12 release packaging scaffold
        run: bash scripts/check_stage12_release_sources.sh

      - name: Check Stage 13 lexicon scaffold
        run: bash scripts/check_stage13_lexicon_sources.sh

      - name: Check local Rime lexicon import
        run: bash scripts/check_local_lexicon_import_sources.sh

      - name: Check Stage 14 iOS signing scaffold
        run: bash scripts/check_stage14_ios_signing_sources.sh

      - name: Check Stage 15 iOS smoke scaffold
        run: bash scripts/check_stage15_ios_smoke_sources.sh

      - name: Check Stage 16 iOS TestFlight scaffold
        run: bash scripts/check_stage16_ios_testflight_sources.sh

      - name: Check AI-01 evaluation baseline
        run: bash scripts/check_ai01_evaluation_sources.sh

      - name: Check AI-02 runtime contracts
        run: bash scripts/check_ai02_runtime_contracts.sh

      - name: Check AI-03 privacy guard
        run: bash scripts/check_ai03_privacy_sources.sh

      - name: Check AI-04 rules-first enhancements
        run: bash scripts/check_ai04_rules_sources.sh

      - name: Check AI-05 model supply-chain gates
        run: bash scripts/check_ai05_model_gate_sources.sh

      - name: Check AI-06 fixed-point Lite ranker
        run: bash scripts/check_ai06_lite_ranker_sources.sh

      - name: Check AI-07 desktop asynchronous integration
        run: bash scripts/check_ai07_desktop_integration_sources.sh

      - name: Check AI-08 iOS Lite integration
        run: bash scripts/check_ai08_ios_integration_sources.sh

      - name: Check AI-09 desktop Helper boundary
        run: bash scripts/check_ai09_desktop_helper_sources.sh

      - name: Check UPDATE-01 version-check source contract
        run: bash scripts/check_update01_sources.sh

      - name: Check UPDATE-02 verified-installer source contract
        run: bash scripts/check_update02_sources.sh

      - name: Check UPDATE-03 process-refresh source contract
        run: bash scripts/check_update03_sources.sh

  macos-update-lifecycle:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-ios-sim

      - name: Build macOS IMK with desktop AI
        env:
          PRIVATE_PINYIN_SKIP_CODESIGN: "1"
        run: bash scripts/build_macos_imk.sh

      - name: Verify macOS process-wide shared engine
        env:
          PRIVATE_PINYIN_REQUIRE_SWIFTC: "1"
        run: bash scripts/test_macos_shared_engine.sh

      - name: Verify macOS imported lexicon source labels
        env:
          PRIVATE_PINYIN_REQUIRE_SWIFTC: "1"
        run: bash scripts/test_macos_imported_lexicon_source.sh

      - name: Build iOS app and keyboard extension
        run: bash scripts/build_ios_keyboard.sh

      - name: Run UPDATE-03 Swift policy tests
        env:
          PRIVATE_PINYIN_REQUIRE_SWIFTC: "1"
        run: bash scripts/check_update03_sources.sh

      - name: Run iOS Chinese transform regression
        env:
          PRIVATE_PINYIN_REQUIRE_SWIFTC: "1"
        run: bash scripts/test_ios_chinese_transform.sh

      - name: Run macOS AI Helper lifecycle tests
        env:
          PRIVATE_PINYIN_REQUIRE_SWIFTC: "1"
        run: bash scripts/test_macos_ai_helper.sh

  windows-tsf:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc i686-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run Windows Rust tests
        shell: pwsh
        run: cargo test --workspace

      - name: Validate Windows onboarding compatibility
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ".\platform\windows_tsf\installer\open-onboarding.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -ne 0) {
            throw ($errors | ForEach-Object Message | Out-String)
          }
          $state = & powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\platform\windows_tsf\installer\open-onboarding.ps1 `
            -StatusOnly | ConvertFrom-Json
          if ($state.InputMethodTip -ne "0804:{6A7D5301-42D7-41FB-9954-4F98A63F6210}{00286F63-195C-445D-AD40-C6D1A4C560AD}") {
            throw "Unexpected PrivatePinyin input method TIP."
          }
          if ($null -eq $state.PSObject.Properties["HasLegacyInputMethod"]) {
            throw "Windows onboarding state is missing legacy TIP migration status."
          }

      - name: Build Windows TSF host
        shell: pwsh
        run: |
          .\scripts\build_windows_tsf.ps1 -Architecture x64 -RustTarget x86_64-pc-windows-msvc
          .\scripts\build_windows_tsf.ps1 -Architecture Win32 -RustTarget i686-pc-windows-msvc

      - name: Run Windows AI Helper lifecycle probe
        shell: pwsh
        run: .\scripts\test_windows_ai_helper.ps1
